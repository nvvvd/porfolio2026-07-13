<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<sc-if value="{{ hasSrc }}" hint-placeholder-val="{{ true }}">
  <img src="{{ src }}" alt="{{ cat }}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;background:#E4DDCD;" />
</sc-if>
<sc-if value="{{ dark }}">
  <div style="position:relative;width:100%;height:100%;background:repeating-linear-gradient(135deg,#2F2B22 0 11px,#262219 11px 22px);border:1px solid rgba(237,232,218,.10);overflow:hidden;">
    <span style="position:absolute;left:14px;bottom:13px;font-family:'Space Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#736D5D;">{{ cat }}</span>
  </div>
</sc-if>
<sc-if value="{{ light }}">
  <div style="position:relative;width:100%;height:100%;background:repeating-linear-gradient(135deg,#EAE4D6 0 11px,#E4DDCD 11px 22px);overflow:hidden;">
    <span style="position:absolute;left:14px;bottom:13px;font-family:'Space Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#A8A08F;">{{ cat }}</span>
  </div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:400},&quot;src&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;cat&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;PORTRAIT · 4:5&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const src = this.props.src;
    const hasSrc = !!src;
    const tone = this.props.tone;
    return {
      src, hasSrc,
      dark: !hasSrc && tone === 'dark',
      light: !hasSrc && tone !== 'dark',
      cat: this.props.cat || 'IMAGE'
    };
  }
}
</script>
</body>
</html>
