<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>404 — Nicolas Vivaudou</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="nv-theme.js"></script>
<script>
// Redirections des URL « devinées » : /fr, /en, /contact… → vraie page.
(function () {
  var p = location.pathname.replace(/\/+$/, '').split('/').pop().toLowerCase();
  var map = { 'fr': 'Accueil.dc.html', 'en': 'Accueil.dc.html', 'home': 'Accueil.dc.html', 'accueil': 'Accueil.dc.html',
    'contact': 'Contact.dc.html', 'about': 'Contact.dc.html?view=apropos', 'a-propos': 'Contact.dc.html?view=apropos',
    'portfolio': 'Portfolio.dc.html', 'galeries': 'Portfolio.dc.html', 'galerie': 'Galerie.dc.html', 'gallery': 'Galerie.dc.html',
    'client': 'Client.dc.html', 'admin': 'Admin.dc.html', 'mentions': 'Mentions.dc.html', 'mentions-legales': 'Mentions.dc.html' };
  if (map[p]) {
    try { if (p === 'en') localStorage.setItem('nv_lang', 'en'); if (p === 'fr') localStorage.setItem('nv_lang', 'fr'); } catch (e) {}
    location.replace('/' + map[p]);
  }
})();
</script>
<style>
  :root{--bg:#FFFFFF;--ink:#111111;--ink-2:#4A4A4A;--muted:#767171;--line:#E6E6E6;--accent:#F2C13C;--on-accent:#161310;}
  html[data-theme="dark"]{--bg:#100F0D;--ink:#F1EDE6;--ink-2:#B4AEA3;--muted:#86817A;--line:#2A2723;}
  @media (prefers-color-scheme: dark){html:not([data-theme="light"]){--bg:#100F0D;--ink:#F1EDE6;--ink-2:#B4AEA3;--muted:#86817A;--line:#2A2723;}}
  html{background:var(--bg);}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px;}
</style>
</head>
<body style="margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;">
  <main style="text-align:center;padding:24px;">
    <div style="font-size:13px;color:var(--muted);">erreur 404 · page not found</div>
    <h1 style="margin:10px 0 0;font-size:clamp(44px,10vw,88px);font-weight:400;letter-spacing:-.035em;line-height:1;">page introuvable.</h1>
    <p style="margin:18px 0 28px;font-size:15px;color:var(--ink-2);line-height:1.55;">Cette page n'existe pas ou a été déplacée.<br>This page doesn't exist or has moved.</p>
    <a href="Accueil.dc.html" style="display:inline-block;background:var(--accent);color:var(--on-accent);text-decoration:none;font-size:14px;padding:14px 22px;border-radius:2px;">← retour à l'accueil</a>
  </main>
</body>
</html>
